# Mosquitto MQTT Broker Configuration
# Feature: 001-agrisolar-smart-farming

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

listener 1883 0.0.0.0

# DEV-ONLY: allow_anonymous true enables unauthenticated access for local development.
# This MUST be disabled (set to false) and broker authentication enabled before any
# non-local or production deployment. See research.md §10 for the hardening plan.
allow_anonymous true

# WebSocket listener for potential future dashboard integration
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true
